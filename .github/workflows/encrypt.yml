name: Encrypt Images to ERS

on:
  workflow_dispatch:

jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pycryptodome

      - name: Encrypt images to ERS
        run: |
          python3 << 'PYEOF'
          import os, hashlib, secrets
          from pathlib import Path
          from Crypto.Cipher import AES

          ERS_MAGIC = b"ERS1"
          SALT = b"E5R8S2Te9c7hI4S0P1a3b5c7d9e"
          AUTH = "bavenbaven:195112d103147ca3d676f9159e6e0f94c2226c5ef739744e54729975d40a53e2"
          SUPPORTED = {".png", ".jpg", ".jpeg", ".bmp", ".gif", ".webp"}

          key = hashlib.sha256(AUTH.encode() + SALT).digest()
          count = 0

          for root, dirs, files in os.walk("."):
              for f in files:
                  fp = Path(root) / f
                  ext = fp.suffix.lower()
                  if ext not in SUPPORTED:
                      continue
                  out = fp.with_suffix(".ers")
                  data = fp.read_bytes()
                  nonce = secrets.token_bytes(12)
                  cipher = AES.new(key, AES.MODE_GCM, nonce=nonce)
                  ct, tag = cipher.encrypt_and_digest(data)
                  ext_b = ext.encode()[1:][:15]
                  out.write_bytes(ERS_MAGIC + bytes([len(ext_b)]) + ext_b + nonce + ct + tag)
                  count += 1
                  print(f"[{count}] {fp} -> {out.name}")

          print(f"\nDone! Encrypted {count} files")
          PYEOF

      - name: Delete original images (keep only ERS)
        run: |
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.bmp" -o -name "*.gif" -o -name "*.webp" \) -not -path "./.git/*" -delete

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-encrypt images to ERS format"
            git push
          fi
