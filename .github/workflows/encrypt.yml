name: Encrypt Images to ERS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pycryptodome

      - name: Encrypt images to ERS
        run: |
          python3 << 'PYEOF'
          import os, hashlib, secrets, subprocess
          from pathlib import Path
          from Crypto.Cipher import AES

          ERS_MAGIC = b"ERS1"
          SALT = b"E5R8S2Te9c7hI4S0P1a3b5c7d9e"
          AUTH = "bavenbaven:195112d103147ca3d676f9159e6e0f94c2226c5ef739744e54729975d40a53e2"
          SUPPORTED = {".png", ".jpg", ".jpeg", ".bmp", ".gif", ".webp"}

          key = hashlib.sha256(AUTH.encode() + SALT).digest()

          # Collect all files to encrypt
          files_to_encrypt = []
          for root, dirs, files in os.walk("."):
              for f in files:
                  fp = Path(root) / f
                  if fp.suffix.lower() in SUPPORTED:
                      files_to_encrypt.append(fp)

          print(f"Found {len(files_to_encrypt)} files to encrypt")

          # Process in batches of 500
          BATCH = 500
          count = 0
          batch_num = 0

          for i in range(0, len(files_to_encrypt), BATCH):
              batch = files_to_encrypt[i:i+BATCH]
              for fp in batch:
                  out = fp.with_suffix(".ers")
                  data = fp.read_bytes()
                  nonce = secrets.token_bytes(12)
                  cipher = AES.new(key, AES.MODE_GCM, nonce=nonce)
                  ct, tag = cipher.encrypt_and_digest(data)
                  ext_b = fp.suffix.encode()[1:][:15]
                  out.write_bytes(ERS_MAGIC + bytes([len(ext_b)]) + ext_b + nonce + ct + tag)
                  fp.unlink()
                  count += 1

              # Commit this batch
              batch_num += 1
              subprocess.run(["git", "add", "-A"], check=True)
              result = subprocess.run(["git", "diff", "--cached", "--quiet"], check=False)
              if result.returncode != 0:
                  msg = f"Encrypt batch {batch_num} ({count}/{len(files_to_encrypt)} files)"
                  subprocess.run(["git", "commit", "-m", msg], check=True)
                  subprocess.run(["git", "push"], check=True)
                  print(f"Pushed batch {batch_num}: {count}/{len(files_to_encrypt)}")
              else:
                  print(f"Batch {batch_num}: no changes")

          print(f"\nDone! Encrypted {count} files in {batch_num} batches")
          PYEOF